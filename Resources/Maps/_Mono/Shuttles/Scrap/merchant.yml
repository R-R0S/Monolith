- proto: Paper
  entities:
  - uid: 1185
    components:
    - type: MetaData
      name: Engineering Notice
    - type: Transform
      pos: -0.4901477,30.870941
      parent: 1
    - type: Paper
      stampState: paper_stamp-nf-engineer
      stampedBy:
      - reapply: False
        stampType: RubberStamp
        stampedColor: '#DB8727FF'
        stampedName: MAWC Engineering
      - reapply: False
        stampType: RubberStamp
        stampedColor: '#A23E3EFF'
        stampedName: Logistics
      content: >2+
                      ///ADVANCE FROM: MAWC ENGINEERING///

        - Seeing as the shuttle passed inspection, this message is get you up to speed with it.


        - The armory is in two halves, stationed above the bridge behind a secret door. There is a  mercfab, a protolathe, and an autolathe for industrial applications, alongside a Circuit imprinted if the user is willing to use an Exofab
         Silo not included.

        - The armory is marked for organization convenience. The LEFT side is for storing operative weapons and gear. The RIGHT side is for stashing market grade weapons you are going to sell.


        - Logistics demanded for this change after several cases of Operatives accidentally losing their guns (Blame incompetence...) and being forced to return to base because they were not content with using the civilian weapons available in their rack.


        - Included within services are a Scientific artifact analysis bay and a Service bar, for unwinding. The rear half of the vessel possesses a specialty bay for selling weapons, so try to use that for safe sales.


        - Attached to a wall is a button which opens the exterior weapons up. This is necessary for self defense! The hull was modified to hide the hardpoints during inspection, so do remember to open those shutters up whenever it gets hot.

  - uid: 1186
    components:
    - type: Transform
      pos: 1.276167,27.725117
      parent: 1
    - type: Paper
      stampState: paper_stamp-nf-engineer
      stampedBy:
      - reapply: False
        stampType: RubberStamp
        stampedColor: '#DB8727FF'
        stampedName: MAWC Engineering
      content: >2-
                                                      ///Notice/// 

        - Avoid interacting with the wall during inspection. Any suspicion directed towards it should be dismissed as missing structural filler.
