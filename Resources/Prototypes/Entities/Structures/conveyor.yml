- type: entity
  id: ConveyorBelt
  name: conveyor belt
  description: A conveyor belt, commonly used to transport large numbers of items elsewhere quite quickly.
  placement:
    mode: SnapgridCenter
  components:
  - type: Rotatable
    rotateWhileAnchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _NF/Structures/conveyor.rsi # Frontier
    state: conveyor_stopped_cw
    drawdepth: HighFloorObjects
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.50,-0.50
          - 0.50,-0.50
          - 0.50,0.50
          - -0.50,0.50
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        - DoorPassable
        hard: False
  - type: Conveyor
  # Exodus-conveyor-speed-begin
  - type: ActivatableUI
    key: enum.ConveyorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ConveyorUiKey.Key:
        type: ConveyorBoundUserInterface
  # Exodus-conveyor-speed-end
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
      - Reverse
      - Forward
      - Off
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ConveyorVisuals.State:
        enum.ConveyorState.Off:
          Off: { state: conveyor_stopped_cw }
          Forward: { state: conveyor_started_cw }
          Reverse: { state: conveyor_started_cw_r }
  - type: Construction
    graph: ConveyorGraph
    node: entity
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      # if ConveyorBeltAssembly becomes craftable, maybe spawn some of the ingredients?
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SyncSprite # Frontier

- type: entity
  id: ConveyorBeltAssembly
  parent: BaseItem
  name: conveyor belt
  suffix: assembly
  description: A conveyor belt assembly. Used to construct a conveyor belt.
  components:
  - type: Tag
    tags:
    - ConveyorAssembly
  - type: Sprite
    sprite: Structures/conveyor.rsi
    state: conveyor_loose
  - type: Construction
    graph: ConveyorGraph
    node: item
  - type: StaticPrice
    price: 40


# Exodus-conveyor-angle-begin
- type: entity
  parent: ConveyorBelt
  id: ConveyorBeltRight
  name: right conveyor belt
  suffix: Right
  components:
  - type: Sprite
    sprite: _Exodus/Structures/conveyor_angle.rsi
    state: right_off
  - type: Conveyor
    angle: 90
    reverseAngle: 0
  - type: GenericVisualizer
    visuals:
      enum.ConveyorVisuals.State:
        enum.ConveyorState.Off:
          Off: { state: right_off }
          Forward: { state: right_fwd }
          Reverse: { state: right_rev }

- type: entity
  parent: ConveyorBelt
  id: ConveyorBeltLeft
  name: left conveyor belt
  suffix: Left
  components:
  - type: Sprite
    sprite: _Exodus/Structures/conveyor_angle.rsi
    state: left_off
  - type: Conveyor
    angle: -90
    reverseAngle: 0
  - type: GenericVisualizer
    visuals:
      enum.ConveyorVisuals.State:
        enum.ConveyorState.Off:
          Off: { state: left_off }
          Forward: { state: left_fwd }
          Reverse: { state: left_rev }
# Exodus-conveyor-angle-end

