- type: constructionGraph
  id: ConveyorGraph
  start: start
  graph:
    - node: start
      edges:
        - to: entity
          steps:
            - tag: ConveyorAssembly
              icon:
                sprite: _NF/Structures/conveyor.rsi # Frontier
                state: conveyor_loose
              name: construction-graph-tag-conveyor-belt-assembly
              doAfter: 2
        # Exodus-conveyor-angle-begin
        - to: entityRight
          steps:
            - tag: ConveyorAssembly
              icon:
                sprite: _Exodus/Structures/conveyor_angle.rsi
                state: right_off
              name: construction-graph-tag-conveyor-belt-assembly
              doAfter: 2
        - to: entityLeft
          steps:
            - tag: ConveyorAssembly
              icon:
                sprite: _Exodus/Structures/conveyor_angle.rsi
                state: left_off
              name: construction-graph-tag-conveyor-belt-assembly
              doAfter: 2
        # Exodus-conveyor-angle-end
    - node: item
      entity: ConveyorBeltAssembly
      actions:
        - !type:SetAnchor
          value: false
    - node: entity
      entity: ConveyorBelt
      actions:
        - !type:SetAnchor
          value: true
        - !type:SnapToGrid
      edges:
        - to: item
          steps:
            - tool: Prying
              doAfter: 3
          completed:
            - !type:SetAnchor
              value: false
    # Exodus-conveyor-angle-begin
    - node: entityRight
      entity: ConveyorBeltRight
      actions:
        - !type:SetAnchor
          value: true
        - !type:SnapToGrid
      edges:
        - to: item
          steps:
            - tool: Prying
              doAfter: 3
          completed:
            - !type:SetAnchor
              value: false
    - node: entityLeft
      entity: ConveyorBeltLeft
      actions:
        - !type:SetAnchor
          value: true
        - !type:SnapToGrid
      edges:
        - to: item
          steps:
            - tool: Prying
              doAfter: 3
          completed:
            - !type:SetAnchor
              value: false
    # Exodus-conveyor-angle-end
