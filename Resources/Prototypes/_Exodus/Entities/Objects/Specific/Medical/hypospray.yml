- type: entity
  id: BorgParamedicHypo
  parent: BaseItem
  name: paramedic borg hypospray
  description: A sterile injector for rapid administration of synthesized emergency medicine.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    state: borghypo
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 30
        reagents:
        - ReagentId: Bicaridine
          Quantity: 30
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: true
    injectOnly: true
    transferAmount: 5
    preventCombatInjection: true
  - type: CyclingHypospray
  - type: ReagentAutoRecharge
    solutionName: hypospray
    reagent: Bicaridine
    rechargeAmount: 5
    rechargeInterval: 30
  - type: UseDelay
    delay: 0.5
