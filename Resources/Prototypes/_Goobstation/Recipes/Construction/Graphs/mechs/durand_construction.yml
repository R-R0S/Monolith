          state: small
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 12

      - tool: Screwing
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 13

      - material: Steel
        amount: 5
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 14

      - tool: Anchoring
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 15

      - tool: Welding
        doAfter: 1
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 16

      - tag: MechAirTank
        name: construction-graph-tag-mech-air-tank
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: mecha_air_tank

      - tool: Anchoring
        doAfter: 1

      - tag: MechThruster
        name: construction-graph-component-exosuit-thruster
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: mecha_bin

      - tool: Anchoring
        doAfter: 1

      - tag: DurandArmor
        name: construction-graph-component-durand-armor
        icon:
          sprite: "_Goobstation/Objects/Specific/Mech/durand_construction.rsi"
          state: durand_armor
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 17

      - tool: Anchoring
        doAfter: 2
        completed:
        - !type:VisualizerDataInt
          key: "enum.MechAssemblyVisuals.State"
          data: 18

  - node: finish
    edges:
    - to: durand
      steps:
      - tool: Welding
        doAfter: 1
    - to: tsfdurand
      steps:
      - tag: MechIFFTSF
        name: construction-graph-component-mech-IFF-TSF
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1
    - to: pdvdurand
      steps:
      - tag: MechIFFPDV
        name: construction-graph-component-Mech-IFF-PDV
        icon:
          sprite: Objects/Specific/Mech/mecha_equipment.rsi
          state: tesla
        doAfter: 1
      - tool: Welding
        doAfter: 1

  - node: durand
    actions:
    - !type:BuildMech
      mechPrototype: MechDurand

  - node: tsfdurand
    actions:
    - !type:BuildMech
      mechPrototype: MechDurandTSF

  - node: pdvdurand
    actions:
    - !type:BuildMech
      mechPrototype: MechDurandPDV
