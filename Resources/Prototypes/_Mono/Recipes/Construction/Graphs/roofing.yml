- type: constructionGraph
  id: CreateRoof
  start: start
  graph:
  - node: start
    edges:
    - to: roof
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: MetalRod
        amount: 1

  - node: roof
    entity: RoofMarker
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: PartRodMetal1
        amount: 1
      - !type:DeleteEntity {}
      steps:
      - tool: Cutting

- type: constructionGraph
  id: RemoveRoof
  start: start
  graph:
  - node: start
    edges:
    - to: roof
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: MetalRod
        amount: 1

  - node: roof
    entity: NoRoofMarker
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: PartRodMetal1
        amount: 1
      - !type:DeleteEntity {}
      steps:
      - tool: Cutting

- type: construction
  name: recipes-create-roof-name
  id: CreateRoof
  graph: CreateRoof
  startNode: start
  targetNode: roof
  category: construction-category-storage
  description: recipes-create-roof-desc
  placementMode: SnapgridCenter
  canRotate: false
  canBuildInImpassable: false
  objectType: Structure

- type: construction
  name: recipes-remove-roof-name
  id: RemoveRoof
  graph: RemoveRoof
  startNode: start
  targetNode: roof
  category: construction-category-storage
  description: recipes-remove-roof-desc
  placementMode: SnapgridCenter
  canRotate: false
  canBuildInImpassable: false
  objectType: Structure
